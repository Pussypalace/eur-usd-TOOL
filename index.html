<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUR → USD</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --bg2: #222222;
    --bg3: #2a2a2a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --text2: #909090;
    --text3: #606060;
    --green: #1D9E75;
    --red: #e05555;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app { width: 100%; max-width: 420px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .rate-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .rate-badge:hover { border-color: var(--green); }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.live { background: var(--green); animation: pulse 2s infinite; }
  .dot.error { background: var(--red); }
  .dot.loading { background: #EF9F27; animation: pulse 0.8s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 0.75rem;
  }

  .field-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
  }

  .input-row { display: flex; align-items: baseline; gap: 8px; }

  .currency-sym {
    font-size: 22px;
    font-weight: 300;
    color: var(--text2);
  }

  input[type="number"] {
    font-size: 36px;
    font-weight: 300;
    font-family: 'IBM Plex Sans', sans-serif;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    width: 100%;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .sep { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

  .result-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 0.4rem;
  }

  .result-row { display: flex; align-items: baseline; gap: 8px; }

  .result-value {
    font-size: 40px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.02em;
    transition: opacity 0.2s;
  }

  .result-cur {
    font-size: 16px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
  }

  .savings-note {
    font-size: 11px;
    color: var(--green);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 16px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 1.25rem;
  }

  .info-cell {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .info-cell-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 4px;
  }

  .info-cell-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
  }
  .info-cell-val.green { color: var(--green); }

  .status-bar {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-text {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }

  .refresh-btn {
    font-size: 11px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { color: var(--green); border-color: var(--green); }

  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    margin-top: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="logo">EUR → USD · −1%</span>
    <div class="rate-badge" onclick="fetchRate()">
      <span class="dot loading" id="dot"></span>
      <span id="rate-display">загрузка...</span>
    </div>
  </div>

  <div class="card">
    <div class="field-label">Сумма в евро</div>
    <div class="input-row">
      <span class="currency-sym">€</span>
      <input type="number" id="eur-input" value="1000" min="0" step="any" oninput="convert()" />
    </div>

    <hr class="sep">

    <div class="result-label">Вы получите · курс −1%</div>
    <div class="result-row">
      <span class="result-value" id="usd-result">—</span>
      <span class="result-cur">USD</span>
    </div>
    <div class="savings-note" id="note"></div>

    <div class="info-grid">
      <div class="info-cell">
        <div class="info-cell-label">Рыночный курс</div>
        <div class="info-cell-val" id="c-market-rate">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Ваш курс (−1%)</div>
        <div class="info-cell-val" id="c-your-rate">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">По рыночному</div>
        <div class="info-cell-val" id="c-market-usd">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Экономия</div>
        <div class="info-cell-val green" id="c-saved">—</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-text" id="status-text">Получаем актуальный курс...</span>
    <button class="refresh-btn" onclick="fetchRate()">↻ обновить</button>
  </div>

  <div class="footer">Источник: Frankfurter API (ECB) · нажми на курс или кнопку для обновления</div>

</div>

<script>
  let MARKET = null;
  let YOUR = null;

  // Несколько API — пробуем по очереди если одно не работает
  const APIS = [
    () => fetch('https://api.frankfurter.app/latest?from=EUR&to=USD').then(r => r.json()).then(d => d.rates.USD),
    () => fetch('https://open.er-api.com/v6/latest/EUR').then(r => r.json()).then(d => d.rates.USD),
    () => fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json').then(r => r.json()).then(d => d.eur.usd),
  ];

  async function fetchRate() {
    const dot = document.getElementById('dot');
    const rateDisplay = document.getElementById('rate-display');
    const statusText = document.getElementById('status-text');

    dot.className = 'dot loading';
    rateDisplay.textContent = 'загрузка...';
    statusText.textContent = 'Получаем актуальный курс...';

    for (const api of APIS) {
      try {
        const rate = await api();
        if (rate && rate > 0) {
          MARKET = rate;
          YOUR = MARKET * 0.99;

          dot.className = 'dot live';
          rateDisplay.textContent = `1 EUR = ${MARKET.toFixed(4)} USD`;

          document.getElementById('c-market-rate').textContent = MARKET.toFixed(4);
          document.getElementById('c-your-rate').textContent = YOUR.toFixed(4);

          const now = new Date();
          const t = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
          statusText.textContent = `Обновлено в ${t} · курс ECB`;

          convert();
          return;
        }
      } catch(e) { /* пробуем следующий */ }
    }

    // Все API не сработали
    dot.className = 'dot error';
    rateDisplay.textContent = 'ошибка';
    statusText.textContent = 'Не удалось получить курс. Нажми ↻ чтобы попробовать снова.';
  }

  function fmt(n) {
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function convert() {
    if (!MARKET) return;
    const eur = parseFloat(document.getElementById('eur-input').value) || 0;
    const yourUsd = eur * YOUR;
    const marketUsd = eur * MARKET;
    const diff = marketUsd - yourUsd;

    document.getElementById('usd-result').textContent = fmt(yourUsd);
    document.getElementById('c-market-usd').textContent = '$' + fmt(marketUsd);
    document.getElementById('c-saved').textContent = eur > 0 ? '-$' + fmt(diff) : '—';
    document.getElementById('note').textContent = eur > 0 ? `На $${diff.toFixed(2)} меньше рыночного` : '';
  }

  // Обновлять курс каждые 5 минут
  fetchRate();
  setInterval(fetchRate, 5 * 60 * 1000);
</script>
</body>
</html>
